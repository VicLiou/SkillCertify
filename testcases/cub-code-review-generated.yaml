name: project-scope-review-only-finds-fixture-issue
skill: 'D:/gitSpace/科技研發科/1.AI輔助開發/cub-mcp-prompt-setup/static-assets/.agents/skills/cub-code-review'
fixture: 'fixtures\cub-code-review-sample'
load_strategy: progressive
runs: 5
input: |-
  請執行 CUB code review。

  PROJECT_PATH: ./cub-code-review-sample
  REVIEW_SCOPE: PROJECT

  只審查 source code，不讀取規格書或 API 文件。請依 skill 的 review report template 輸出結果。
expect:
