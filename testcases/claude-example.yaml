# Run with:  skill-test testcases/claude-example.yaml --adapter claude
name: claude-greet-happy-path
skill: skills/example-skill
load_strategy: progressive          # flatten | progressive | scripts-only
input: |
  Use the example-skill to greet "Alice" and write the greeting to out.txt.
runs: 5                             # bump up once it's green
model: sonnet                       # alias ok; omit to use your default model
timeout_s: 300
expect:
  - exit_code: 0
  - file_exists: out.txt
  - final_contains: ["done"]
  # - tool_used: Bash          # Claude's tool names: Bash, Write, Read, ...
  # - regex: "\\d+ characters"
